# Maven Wrapper configuration for the Qavo backend platform.
#
# The wrapper binary (maven-wrapper.jar) and the bootstrap scripts (mvnw, mvnw.cmd)
# can be generated/refreshed from a local Maven installation with:
#
#     mvn -N wrapper:wrapper -Dmaven=3.9.9
#
# Until the binary is generated, build with a locally installed Maven 3.9.x and a JDK 21
# toolchain. The distribution URL below pins the Maven version the project is validated against.
wrapperVersion=3.3.2
distributionType=only-script
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip
